<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты | Портфолио</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div class="hero-glow hero-glow-left" aria-hidden="true"></div>
    <div class="hero-glow hero-glow-right" aria-hidden="true"></div>
    <nav class="nav container">
      <div class="logo"><a href="index.html">Portfolio</a></div>
      <div class="nav-links">
        <a href="about.html">Обо мне</a>
        <a href="skills.html">Навыки</a>
        <a href="projects.html">Проекты</a>
        <a href="funny.html">Смешное</a>
        <a href="contact.html">Контакты</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="section section-accent reveal is-visible">
      <div class="container contact-box">
        <div>
          <p class="section-label light">Контакты</p>
          <h2>Готов обсудить ваш проект</h2>
          <p>
            Напишите мне, если вам нужен сайт, редизайн, интерфейс или помощь с визуальной частью продукта.
          </p>
        </div>
        <div class="contact-links">
          <a href="mailto:hello@example.com">hello@example.com</a>
          <a href="https://t.me/username">Telegram</a>
          <a href="https://www.linkedin.com/">LinkedIn</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var navLinks = Array.prototype.slice.call(document.querySelectorAll(".nav-links a"));
      var currentPath = location.pathname.split("/").pop() || "index.html";
      navLinks.forEach(function (link) {
        link.classList.toggle("is-active", link.getAttribute("href") === currentPath);
      });
    })();
  </script>
</body>
</html>
